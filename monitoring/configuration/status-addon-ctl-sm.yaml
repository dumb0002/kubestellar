apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: status-addon-controller
spec:
  endpoints:
  - interval: 5s
    path: /metrics
    port: metrics
    scheme: http
  namespaceSelector:
    matchNames:
    - %WDS_NS%
  selector:
    matchLabels:
      app: status-addon-controller
