prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ibmc-block-gold
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
    securityContext:
      runAsGroup: null
      runAsNonRoot: null
      runAsUser: null
      fsGroup: null
      seccompProfile:
        type: RuntimeDefault
    serviceMonitorNamespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: ks-monitoring

    remoteWrite:
      #- url: "http://%THANOS_HOST%/api/v1/receive"
      - url: "https://%THANOS_HOST%/api/v1/receive" #(WEC configuration)
  serviceMonitor:
    selfMonitor: false

prometheusOperator:
  serviceMonitor:
    selfMonitor: false
  admissionWebhooks:
    patch:
      securityContext:
        runAsGroup: null
        runAsNonRoot: null
        runAsUser: null
        seccompProfile:
          type: RuntimeDefault
  securityContext:
        fsGroup: null
        runAsGroup: null
        runAsNonRoot: true
        runAsUser: null
        seccompProfile:
          type: RuntimeDefault

kubeControllerManager:
  enabled: false
coreDns:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
kubeScheduler:
  enabled: false
kubelet:
  enabled: false

thanosRuler:
  thanosRulerSpec:
    securityContext:
        runAsGroup: null
        runAsNonRoot: null
        runAsUser: null
        fsGroup: null
        seccompProfile:
          type: RuntimeDefault
   